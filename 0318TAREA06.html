    .especial {
        color: red;
    }

    /*  Selector de ID */
    #titulo {

    }

    /*  Selector descendente */
    ul li {
        color: green;
    }

        margin: 10px;
    }

    /*  Pseudoclases */
    a:link { color: blue; }
    a:visited { color: pink; }
    a:hover { color: red; }
    a:active { color: yellow; }

    </style>
</head>
