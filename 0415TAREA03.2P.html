<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TAREA 3</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: lightyellow;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="shadow-sm p-4 border rounded bg-white">

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Fecha de inicio</label>
                    <input type="date" class="form-control">

                    <label class="form-label mt-3">Auto</label>
                    <select class="form-select form-select-sm">
                        <option selected>Seleccione un Auto</option>
                        <option>One</option>
                        <option>Two</option>
                        <option>Three</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Fecha de conclusión</label>
                    <input type="date" class="form-control">

                    <label class="form-label mt-3">Driver</label>
                    <select class="form-select form-select-sm">
                        <option selected>Seleccione un driver</option>
                        <option>One</option>
                        <option>Two</option>
                        <option>Three</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Proveedor</label>
                    <select class="form-select form-select-sm">
                        <option selected>Seleccione un Proveedor</option>
                        <option>One</option>
                        <option>Two</option>
                        <option>Three</option>
                    </select>

                    <label class="form-label mt-3">Id ruta</label>
                    <input type="text" class="form-control" placeholder="Id ruta">
                </div>
            </div>

            <div class="row mt-4">
                <div class="d-grid gap-2 col-6 mx-auto">
                    <button type="button" class="btn btn-warning">Buscar</button>
                </div>
                <div class="d-grid gap-2 col-6 mx-auto">
                    <button type="button" class="btn btn-outline-warning">Nueva Ruta</button>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
